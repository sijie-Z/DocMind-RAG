apiVersion: v1
kind: Namespace
metadata:
  name: docmind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docmind-config
  namespace: docmind
data:
  DATABASE_URL: "mysql+aiomysql://docmind:docmind123@docmind-mysql:3306/docmind"
  REDIS_HOST: "docmind-redis"
  ELASTICSEARCH_HOSTS: '["http://docmind-elasticsearch:9200"]'
  MINIO_ENDPOINT: "docmind-minio:9000"
  KAFKA_BOOTSTRAP_SERVERS: "docmind-kafka:9092"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  ENABLE_DEMO_ACCOUNT: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: docmind-secrets
  namespace: docmind
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production-32bytes!"
  JWT_SECRET_KEY: "change-me-too-32bytes!"
  DEEPSEEK_API_KEY: "your-api-key-here"
  EMBEDDING_API_KEY: "your-api-key-here"
  RERANK_API_KEY: "your-api-key-here"
  MYSQL_ROOT_PASSWORD: "changeme_root_pw"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
