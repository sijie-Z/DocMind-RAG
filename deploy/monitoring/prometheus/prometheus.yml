global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rag_backend"
    metrics_path: "/metrics"
    static_configs:
      # 在 docker-compose 中，通常指向宿主机或者 backend 容器名
      - targets: ["host.docker.internal:8000"]
