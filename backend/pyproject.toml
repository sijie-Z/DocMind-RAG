[tool.ruff]
# DocMind Python linting configuration
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Enable rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # naming
    "UP",   # pyupgrade
    "B",    # bugbear
    "A",    # builtins
    "RET",  # return
    "SLF",  # self/private
    "SIM",  # simplify
]

# Ignore specific rules
ignore = [
    "E501",    # line too long (handled by ruff format)
    "N802",    # function names in snake_case — FastAPI handlers often use CamelCase
    "N803",    # argument names
    "N806",    # variable names
    "N815",    # mixed case variables
    "SIM108",  # ternary if
    "SIM117",  # multiple with
    "SIM115",  # open with
    "B008",    # function-call-in-default-argument — FastAPI Depends() is designed for this
    "E402",    # module-import-not-at-top — intentional for circular import avoidance
    "B904",    # raise-without-from-inside-except
    "W293",    # blank-line-with-whitespace
    "SLF001",  # private-member-access
    "UP042",   # replace-str-enum
    "A002",    # builtin-argument-shadowing — intentional (format, id, type)
    "A003",    # builtin-attribute-shadowing
    "E741",    # ambiguous-variable-name — math conventions (l, O)
    "B005",    # strip-with-multi-characters
    "SIM102",  # collapsible-if — readability preference
    "SIM105",  # suppressible-exception
    "E721",    # type-comparison — isinstance not always equivalent
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["A", "SLF"]
"app/models/*" = ["F821"]  # SQLAlchemy string-based relationship() references

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: Unit tests (no external deps)",
    "integration: Integration tests (need DB/ES/Redis)",
    "slow: Slow tests (deselect with -m 'not slow')",
]
