[tool.ruff]
# DocMind Python linting configuration
target-version = "py311"
line-length = 100

# Enable rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # naming
    "UP",   # pyupgrade
    "B",    # bugbear
    "A",    # builtins
    "RET",  # return
    "SLF",  # self/private
    "SIM",  # simplify
]

# Ignore specific rules
ignore = [
    "E501",    # line too long (handled by ruff format)
    "N802",    # function names in snake_case — FastAPI handlers often use CamelCase
    "N803",    # argument names
    "N806",    # variable names
    "N815",    # mixed case variables
    "SIM108",  # ternary if
    "SIM117",  # multiple with
    "SIM115",  # open with
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["A", "SLF"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: Unit tests (no external deps)",
    "integration: Integration tests (need DB/ES/Redis)",
    "slow: Slow tests (deselect with -m 'not slow')",
]
