# DocMind RAG Knowledge Base System - Docker Compose
# All secrets are injected via .env.docker (copy from .env.docker.example)

services:
  # FastAPI backend
  backend:
    build: .
    container_name: docmind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      # Override connection strings for Docker internal networking
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-docmind}:${MYSQL_PASSWORD:-docmind123}@docmind-mysql:3306/${MYSQL_DATABASE:-docmind}
      - REDIS_HOST=docmind-redis
      - ELASTICSEARCH_HOSTS=["http://docmind-elasticsearch:9200"]
      - MINIO_ENDPOINT=docmind-minio:9000
      - KAFKA_BOOTSTRAP_SERVERS=docmind-kafka:9092
      - RATE_LIMIT_REQUESTS_PER_MINUTE=300
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=30
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./temp_uploads:/app/temp_uploads
    networks:
      - docmind-network
    restart: unless-stopped

  # RAG Worker - document parsing and indexing
  worker:
    build: .
    container_name: docmind-worker
    command: python start_worker.py
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-docmind}:${MYSQL_PASSWORD:-docmind123}@docmind-mysql:3306/${MYSQL_DATABASE:-docmind}
      - REDIS_HOST=docmind-redis
      - ELASTICSEARCH_HOSTS=["http://docmind-elasticsearch:9200"]
      - MINIO_ENDPOINT=docmind-minio:9000
      - KAFKA_BOOTSTRAP_SERVERS=docmind-kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - docmind-network
    restart: unless-stopped

  # MySQL 8 with UTF8MB4
  mysql:
    image: mysql:8.0
    container_name: docmind-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme_root_pw}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-docmind}
      - MYSQL_USER=${MYSQL_USER:-docmind}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-docmind123}
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - docmind-network
    healthcheck:
      test: "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-changeme_root_pw}"
      timeout: 20s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - docmind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: docmind-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - docmind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: docmind-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - docmind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: docmind-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - docmind-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: docmind-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: docmind-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - docmind-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: docmind-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
    networks:
      - docmind-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: docmind-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - docmind-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  docmind-network:
    driver: bridge
    
