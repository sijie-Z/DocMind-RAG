name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov bandit

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ tests/

      - name: Security scan with bandit
        working-directory: backend
        run: bandit -r app/ --quiet || true

      - name: Set test environment
        run: |
          echo "SECRET_KEY=test-secret-key-for-pytest-only-32chars!" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=test-jwt-secret-key-for-pytest-only!" >> $GITHUB_ENV
          echo "DATABASE_URL=mysql+aiomysql://root:***@localhost:3306/test_db" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "ELASTICSEARCH_HOSTS=[\"http://localhost:9200\"]" >> $GITHUB_ENV
          echo "KAFKA_BOOTSTRAP_SERVERS=localhost:9092" >> $GITHUB_ENV
          echo "MINIO_ENDPOINT=localhost:9000" >> $GITHUB_ENV
          echo "DEEPSEEK_API_KEY=test-key" >> $GITHUB_ENV
          echo "EMBEDDING_API_KEY=test-key" >> $GITHUB_ENV
          echo "ENABLE_RATE_LIMIT=false" >> $GITHUB_ENV
          echo "ENABLE_MONITORING=false" >> $GITHUB_ENV

      - name: Run tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term --ignore=tests/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint . --ext .vue,.ts,.tsx

      - name: Type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage/
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: docmind-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: docmind-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Check for known vulnerabilities (backend)
        working-directory: backend
        run: |
          pip install safety
          safety check -r requirements.txt || true

  ci-pass:
    name: CI Pass
    if: always()
    needs: [backend-tests, frontend-tests, docker-build, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then echo "backend-tests failed"; exit 1; fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then echo "frontend-tests failed"; exit 1; fi
          echo "All CI checks passed!"
